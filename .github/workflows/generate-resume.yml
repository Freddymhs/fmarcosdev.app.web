name: 📄 Multi-Format Resume

on:
  push:
    branches:
      - main
    paths-ignore:
      - "src/generate-resume-files-by-workflow/**"
  repository_dispatch:
    types:
      - resume-updated
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual workflow dispatch"
        required: false
        default: "Manual resume generation"

permissions:
  contents: write

jobs:
  generate-resume-formats:
    name: 🚀 Create Resume pdf doc html
    runs-on: ubuntu-latest
    steps:
      - name: 🏁 Initialize Workflow
        uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: true
          fetch-depth: 0

      - name: 🛠️ Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"

      - name: 📦 Cache Node Modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: 📦 Install Dependencies
        run: npm install

      - name: 🛠️ Install System Packages
        run: |
          sudo apt update
          sudo apt install -y wkhtmltopdf pandoc
          npm install --no-save jsonresume-theme-dev-ats-es resume-cli

      - name: 🔐 Verify required secrets
        run: |
          MISSING=()
          if [ -z "${{ secrets.API_RESUME_URL }}" ]; then
            MISSING+=("API_RESUME_URL — URL base de api.resume (ej. https://resume.fmarcos.dev)")
          fi
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "❌ Faltan secrets requeridos:"
            for m in "${MISSING[@]}"; do echo "   • $m"; done
            echo ""
            echo "Agregar en: repo → Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "✅ API_RESUME_URL — ${{ secrets.API_RESUME_URL }}"

      - name: 📥 Fetch resume.json from api.resume
        run: curl -f "${{ secrets.API_RESUME_URL }}/api/resume" -o resume.json

      - name: 📋 Generate Multi Documents
        run: |
          npx resume export --theme dev-ats-es --format html cv.html
          wkhtmltopdf cv.html cv.pdf
          pandoc cv.html -o cv.docx
          ls

      - name: 📂 Move Generated Files
        run: |
          mkdir -p src/generate-resume-files-by-workflow
          mv cv.html src/generate-resume-files-by-workflow/cv.html
          mv cv.pdf src/generate-resume-files-by-workflow/cv.pdf
          mv cv.docx src/generate-resume-files-by-workflow/cv.docx

      - name: 🏗️ Build Project
        run: npm run build

      - name: 🔧 Configure Git User
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: 🚀 Commit and Push to Main
        run: |
          git add .
          if git diff --staged --quiet; then
            echo "Nothing to commit"
            exit 0
          fi
          git pull --rebase origin main
          git commit -m "🔄 Automated add new resumes and build"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ Workflow Completion Notification
        if: success()
        run: echo "Resume generation and push to main completed successfully! 🎉"
